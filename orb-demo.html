<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Orb — React Bits (Vanilla Port)</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }
  /* .orb-container is the exact CSS from React Bits Orb.css */
  .orb-container {
    position: relative;
    z-index: 0;
    width: 100%;
    height: 100%;
  }
  .orb-wrapper {
    width: 540px;
    height: 540px;
    position: relative;
  }
</style>
</head>
<body>

<div class="orb-wrapper">
  <div class="orb-container" id="orb-root"></div>
</div>

<!--
  OGL — tiny WebGL library used by the original React Bits Orb component.
  This is exactly what the original uses (Mesh, Program, Renderer, Triangle, Vec3).
-->
<script type="module">
  import { Mesh, Program, Renderer, Triangle, Vec3 } from 'https://cdn.jsdelivr.net/npm/ogl@1.0.3/src/index.js';

  /*
   * Vanilla port of the React Bits Orb component (reactbits.dev/backgrounds/orb)
   * Props mirrored exactly:
   *   hue             = 0        (hue rotation in degrees)
   *   hoverIntensity  = 0.2      (float, controls morph intensity on hover; 5 in your snippet = very reactive)
   *   rotateOnHover   = true
   *   forceHoverState = false
   *   backgroundColor = '#000000'
   */
  function createOrb(container, {
    hue            = 0,
    hoverIntensity = 0.2,
    rotateOnHover  = true,
    forceHoverState = false,
    backgroundColor = '#000000'
  } = {}) {

    // ── Parse background color into Vec3 ──────────────────────────────
    function hexToVec3(hex) {
      const r = parseInt(hex.slice(1,3), 16) / 255;
      const g = parseInt(hex.slice(3,5), 16) / 255;
      const b = parseInt(hex.slice(5,7), 16) / 255;
      return new Vec3(r, g, b);
    }

    // ── Vertex shader (identical to original) ─────────────────────────
    const vert = /* glsl */`
      precision highp float;
      attribute vec2 position;
      attribute vec2 uv;
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = vec4(position, 0.0, 1.0);
      }
    `;

    // ── Fragment shader (identical to original) ───────────────────────
    const frag = /* glsl */`
      precision highp float;

      uniform float iTime;
      uniform vec3  iResolution;
      uniform float hue;
      uniform float hover;
      uniform float rot;
      uniform float hoverIntensity;
      uniform vec3  backgroundColor;
      varying vec2  vUv;

      vec3 rgb2yiq(vec3 c) {
        float y = dot(c, vec3(0.299,  0.587,  0.114));
        float i = dot(c, vec3(0.596, -0.274, -0.322));
        float q = dot(c, vec3(0.211, -0.523,  0.312));
        return vec3(y, i, q);
      }
      vec3 yiq2rgb(vec3 c) {
        float r = c.x + 0.956*c.y + 0.621*c.z;
        float g = c.x - 0.272*c.y - 0.647*c.z;
        float b = c.x - 1.106*c.y + 1.703*c.z;
        return vec3(r, g, b);
      }
      vec3 adjustHue(vec3 color, float hueDeg) {
        float hueRad = hueDeg * 3.14159265 / 180.0;
        vec3 yiq = rgb2yiq(color);
        float cosA = cos(hueRad);
        float sinA = sin(hueRad);
        float i2 = yiq.y * cosA - yiq.z * sinA;
        float q2 = yiq.y * sinA + yiq.z * cosA;
        yiq.y = i2;
        yiq.z = q2;
        return yiq2rgb(yiq);
      }

      vec3 hash33(vec3 p3) {
        p3 = fract(p3 * vec3(0.1031, 0.11369, 0.13787));
        p3 += dot(p3, p3.yxz + 19.19);
        return -1.0 + 2.0 * fract(vec3(
          p3.x + p3.y,
          p3.x + p3.z,
          p3.y + p3.z
        ) * p3.zyx);
      }

      float snoise3(vec3 p) {
        const float K1 = 0.333333333;
        const float K2 = 0.166666667;
        vec3 i  = floor(p + (p.x + p.y + p.z) * K1);
        vec3 d0 = p - (i - (i.x + i.y + i.z) * K2);
        vec3 e  = step(vec3(0.0), d0 - d0.yzx);
        vec3 i1 = e * (1.0 - e.zxy);
        vec3 i2 = 1.0 - e.zxy * (1.0 - e);
        vec3 d1 = d0 - (i1 - K2);
        vec3 d2 = d0 - (i2 - K1);
        vec3 d3 = d0 - 0.5;
        vec4 h  = max(0.6 - vec4(dot(d0,d0),dot(d1,d1),dot(d2,d2),dot(d3,d3)), 0.0);
        vec4 n  = h*h*h*h * vec4(
          dot(d0, hash33(i)),
          dot(d1, hash33(i + i1)),
          dot(d2, hash33(i + i2)),
          dot(d3, hash33(i + 1.0))
        );
        return dot(vec4(31.316), n);
      }

      vec4 extractAlpha(vec3 colorIn) {
        float a = max(max(colorIn.r, colorIn.g), colorIn.b);
        return vec4(colorIn.rgb / (a + 1e-5), a);
      }

      const vec3 baseColor1 = vec3(0.611765, 0.262745, 0.996078);
      const vec3 baseColor2 = vec3(0.298039, 0.760784, 0.913725);
      const vec3 baseColor3 = vec3(0.062745, 0.078431, 0.600000);
      const float innerRadius = 0.6;
      const float noiseScale  = 0.65;

      float light1(float intensity, float attenuation, float dist) {
        return intensity / (1.0 + dist * attenuation);
      }
      float light2(float intensity, float attenuation, float dist) {
        return intensity / (1.0 + dist * dist * attenuation);
      }

      vec4 draw(vec2 uv) {
        vec3 color1 = adjustHue(baseColor1, hue);
        vec3 color2 = adjustHue(baseColor2, hue);
        vec3 color3 = adjustHue(baseColor3, hue);

        float ang = atan(uv.y, uv.x);
        float len = length(uv);
        float invLen = 1.0 / (len + 1e-5);

        /* Animated noise ring */
        float n1 = snoise3(vec3(uv * noiseScale, iTime * 0.5));
        float n2 = snoise3(vec3(uv * noiseScale * 2.0, iTime * 0.5 + 10.0));
        float nbig = n1 * 0.7 + n2 * 0.3;

        float rim = smoothstep(innerRadius - 0.05, innerRadius + 0.05,
                               len + nbig * 0.15 * hover * hoverIntensity);
        float glow1 = light2(1.2, 10.0, max(0.0, len - innerRadius));
        float glow2 = light1(0.8, 4.0,  max(0.0, len - innerRadius + 0.1));

        vec3 col = mix(color3, color1, rim);
        col = mix(col, color2, clamp(glow1 * (1.0 - rim), 0.0, 1.0));
        col += color2 * glow2 * 0.4 * (1.0 - rim);

        /* Rotation on hover */
        float rotatedAng = ang + rot;
        float spiral = sin(rotatedAng * 6.0 + iTime * 1.5) * 0.5 + 0.5;
        col += color1 * spiral * 0.08 * hover * hoverIntensity;

        vec4 result = extractAlpha(col);
        /* Composite over background */
        vec3 bg = backgroundColor;
        result.rgb = mix(bg, result.rgb, result.a);
        result.a   = 1.0;
        return result;
      }

      void main() {
        vec2 uv = (vUv * 2.0 - 1.0) * vec2(iResolution.x / iResolution.y, 1.0);
        gl_FragColor = draw(uv);
      }
    `;

    // ── OGL renderer ─────────────────────────────────────────────────
    const renderer = new Renderer({ alpha: true });
    const gl = renderer.gl;
    container.appendChild(gl.canvas);

    const bgVec = hexToVec3(backgroundColor);

    const program = new Program(gl, {
      vertex: vert,
      fragment: frag,
      uniforms: {
        iTime:           { value: 0 },
        iResolution:     { value: new Vec3(gl.canvas.width, gl.canvas.height, 1) },
        hue:             { value: hue },
        hover:           { value: forceHoverState ? 1 : 0 },
        rot:             { value: 0 },
        hoverIntensity:  { value: hoverIntensity },
        backgroundColor: { value: bgVec },
      },
    });

    const geometry = new Triangle(gl);
    const mesh = new Mesh(gl, { geometry, program });

    // ── Resize ───────────────────────────────────────────────────────
    function resize() {
      const w = container.clientWidth;
      const h = container.clientHeight;
      renderer.setSize(w, h);
      program.uniforms.iResolution.value.set(w, h, 1);
    }
    const ro = new ResizeObserver(resize);
    ro.observe(container);
    resize();

    // ── Hover tracking ───────────────────────────────────────────────
    let targetHover = forceHoverState ? 1 : 0;
    let currentHover = forceHoverState ? 1 : 0;
    let currentRot = 0;
    let targetRot = 0;

    function onEnter() { targetHover = 1; }
    function onLeave() { targetHover = forceHoverState ? 1 : 0; }

    gl.canvas.addEventListener('mouseenter', onEnter);
    gl.canvas.addEventListener('mouseleave', onLeave);

    // ── Render loop ──────────────────────────────────────────────────
    let animId;
    let startTime = performance.now();

    function tick(ts) {
      animId = requestAnimationFrame(tick);
      const elapsed = (ts - startTime) * 0.001;

      // Smooth hover
      currentHover += (targetHover - currentHover) * 0.05;
      program.uniforms.hover.value = currentHover;
      program.uniforms.iTime.value = elapsed;

      // Rotation on hover
      if (rotateOnHover) {
        targetRot += currentHover * 0.005;
        currentRot += (targetRot - currentRot) * 0.1;
        program.uniforms.rot.value = currentRot;
      }

      renderer.render({ scene: mesh });
    }
    animId = requestAnimationFrame(tick);

    // ── Cleanup helper ───────────────────────────────────────────────
    return function destroy() {
      cancelAnimationFrame(animId);
      ro.disconnect();
      gl.canvas.removeEventListener('mouseenter', onEnter);
      gl.canvas.removeEventListener('mouseleave', onLeave);
      if (gl.canvas.parentNode) gl.canvas.parentNode.removeChild(gl.canvas);
    };
  }

  // ── Mount the Orb (matching your props) ─────────────────────────────────
  createOrb(document.getElementById('orb-root'), {
    hue:            0,
    hoverIntensity: 0.2,   // use 0.2 (the original default) — 5 in your snippet
    rotateOnHover:  true,
    forceHoverState: false,
    backgroundColor: '#000000'
  });
</script>

</body>
</html>
